<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Login - Kas Kelas X RPL</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg-primary:#0f0f0f;
  --bg-card:#1e1e2e;
  --bg-card2:#252540;
  --accent-purple:#6c63ff;
  --accent-green:#26A69A;
  --accent-red:#EF5350;
  --text-primary:#ffffff;
  --text-secondary:#9e9e9e;
  --text-muted:#555;
  --border:#2a2a4a;
}

body{
  background:var(--bg-primary);
  color:var(--text-primary);
  font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh;
  max-width:480px;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px;
  position:relative;
  overflow:hidden;
}

/* BG DECORATIONS */
.bg-circle1{
  position:fixed;top:-100px;right:-80px;
  width:300px;height:300px;
  background:radial-gradient(circle,rgba(108,99,255,0.15),transparent 70%);
  border-radius:50%;pointer-events:none;
}
.bg-circle2{
  position:fixed;bottom:-80px;left:-60px;
  width:250px;height:250px;
  background:radial-gradient(circle,rgba(38,166,154,0.1),transparent 70%);
  border-radius:50%;pointer-events:none;
}
.bg-circle3{
  position:fixed;top:40%;left:-40px;
  width:180px;height:180px;
  background:radial-gradient(circle,rgba(108,99,255,0.08),transparent 70%);
  border-radius:50%;pointer-events:none;
}

/* ANIMATIONS */
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes bounceIn{
  0%{transform:scale(0.3);opacity:0;}
  50%{transform:scale(1.08);}
  70%{transform:scale(0.95);}
  100%{transform:scale(1);opacity:1;}
}
@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(108,99,255,0.4);}50%{box-shadow:0 0 0 12px rgba(108,99,255,0);}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}

/* LOGO */
.logo-wrap{
  text-align:center;
  margin-bottom:28px;
  animation:fadeDown 0.6s cubic-bezier(0.4,0,0.2,1);
}
.logo{
  width:80px;height:80px;
  background:linear-gradient(135deg,var(--accent-purple),#8b5cf6);
  border-radius:24px;
  display:flex;align-items:center;justify-content:center;
  font-size:38px;
  margin:0 auto 16px;
  box-shadow:0 12px 40px rgba(108,99,255,0.45);
  animation:bounceIn 0.7s cubic-bezier(0.4,0,0.2,1), float 3s ease-in-out 1s infinite;
}
.logo-title{
  font-size:26px;font-weight:800;
  background:linear-gradient(135deg,#fff,var(--accent-purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:6px;
}
.logo-sub{
  font-size:13px;color:var(--text-secondary);
  line-height:1.5;
}

/* CARD */
.login-card{
  width:100%;
  background:var(--bg-card);
  border-radius:24px;
  padding:28px;
  border:1px solid var(--border);
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
  animation:fadeUp 0.6s cubic-bezier(0.4,0,0.2,1) 0.2s both;
  position:relative;
  overflow:hidden;
}
.login-card::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent-purple),transparent);
}

/* FORM */
.form-group{margin-bottom:16px;}
.form-label{
  font-size:12px;font-weight:600;
  color:var(--text-secondary);
  margin-bottom:7px;display:block;
  text-transform:uppercase;letter-spacing:0.8px;
}
.input-wrap{position:relative;}
.input-icon{
  position:absolute;left:14px;top:50%;
  transform:translateY(-50%);
  color:var(--text-muted);font-size:15px;
  transition:color 0.2s;
}
.form-input{
  width:100%;
  background:var(--bg-card2);
  border:1.5px solid var(--border);
  border-radius:13px;
  padding:14px 16px 14px 42px;
  color:var(--text-primary);
  font-size:15px;
  outline:none;
  transition:all 0.25s;
}
.form-input:focus{
  border-color:var(--accent-purple);
  box-shadow:0 0 0 3px rgba(108,99,255,0.15);
}
.form-input:focus + .input-icon,
.input-wrap:focus-within .input-icon{color:var(--accent-purple);}
.form-input::placeholder{color:var(--text-muted);}
.form-input.has-right{padding-right:46px;}

.toggle-eye{
  position:absolute;right:14px;top:50%;
  transform:translateY(-50%);
  cursor:pointer;color:var(--text-muted);font-size:16px;
  transition:color 0.2s;z-index:1;
}
.toggle-eye:hover{color:var(--accent-purple);}

/* BUTTONS */
.btn-login{
  width:100%;padding:15px;
  border-radius:14px;border:none;
  background:linear-gradient(135deg,var(--accent-purple),#8b5cf6);
  color:white;font-size:15px;font-weight:700;
  cursor:pointer;
  transition:all 0.25s cubic-bezier(0.4,0,0.2,1);
  box-shadow:0 6px 20px rgba(108,99,255,0.4);
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-top:4px;
  position:relative;overflow:hidden;
  animation:pulse 2s ease-in-out 1.5s infinite;
}
.btn-login:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 28px rgba(108,99,255,0.55);
  animation:none;
}
.btn-login:active{transform:scale(0.98);}
.btn-login:disabled{opacity:0.65;cursor:not-allowed;transform:none;animation:none;}

.btn-publik{
  width:100%;padding:14px;
  border-radius:14px;
  border:1.5px solid var(--border);
  background:transparent;
  color:var(--text-secondary);
  font-size:14px;font-weight:600;
  cursor:pointer;margin-top:10px;
  transition:all 0.25s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-publik:hover{border-color:var(--accent-purple);color:var(--accent-purple);}
.btn-publik:active{transform:scale(0.98);}

/* DIVIDER */
.divider{
  display:flex;align-items:center;gap:12px;
  margin:16px 0;
}
.divider-line{flex:1;height:1px;background:var(--border);}
.divider-text{font-size:11px;color:var(--text-muted);}

/* ERROR */
.error-msg{
  background:rgba(239,83,80,0.12);
  border:1px solid rgba(239,83,80,0.3);
  border-radius:10px;padding:11px 14px;
  font-size:13px;color:var(--accent-red);
  margin-bottom:14px;
  display:none;align-items:center;gap:8px;
  animation:fadeUp 0.3s ease;
}
.error-msg.show{display:flex;}

/* SPINNER */
.spinner{
  width:18px;height:18px;
  border:2.5px solid rgba(255,255,255,0.3);
  border-top-color:white;
  border-radius:50%;
  animation:spin 0.7s linear infinite;
  flex-shrink:0;
}

/* VERSION */
.version{
  margin-top:20px;
  font-size:11px;color:var(--text-muted);
  text-align:center;
  animation:fadeUp 0.6s ease 0.5s both;
}

/* RIPPLE */
.ripple{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,0.25);
  transform:scale(0);
  animation:rippleAnim 0.6s linear;
  pointer-events:none;
}
@keyframes rippleAnim{to{transform:scale(4);opacity:0;}}

@media(min-width:480px){body{border-left:1px solid var(--border);border-right:1px solid var(--border);}}
</style>
</head>
<body>

<div class="bg-circle1"></div>
<div class="bg-circle2"></div>
<div class="bg-circle3"></div>

<!-- LOGO -->
<div class="logo-wrap">
  <div class="logo">🏫</div>
  <div class="logo-title">Kas Kelas X RPL</div>
  <div class="logo-sub">Sistem Manajemen Keuangan Kelas<br>Transparan & Mudah Digunakan</div>
</div>

<!-- CARD -->
<div class="login-card">

  <!-- ERROR -->
  <div class="error-msg" id="errorMsg">
    <i class="fas fa-exclamation-circle"></i>
    <span id="errorText">Username atau password salah</span>
  </div>

  <!-- USERNAME -->
  <div class="form-group">
    <label class="form-label">Username</label>
    <div class="input-wrap">
      <input
        type="text"
        class="form-input"
        id="loginUsername"
        placeholder="Masukkan username"
        autocomplete="username"
        onkeypress="handleEnter(event)"
      />
      <i class="fas fa-user input-icon"></i>
    </div>
  </div>

  <!-- PASSWORD -->
  <div class="form-group">
    <label class="form-label">Password</label>
    <div class="input-wrap">
      <input
        type="password"
        class="form-input has-right"
        id="loginPassword"
        placeholder="Masukkan password"
        autocomplete="current-password"
        onkeypress="handleEnter(event)"
      />
      <i class="fas fa-lock input-icon"></i>
      <span class="toggle-eye" onclick="togglePass()">
        <i class="fas fa-eye" id="eyeIcon"></i>
      </span>
    </div>
  </div>

  <!-- BTN LOGIN -->
  <button class="btn-login" id="btnLogin" onclick="doLogin()">
    <i class="fas fa-sign-in-alt"></i>
    Masuk Sebagai Bendahara / Admin
  </button>

  <!-- DIVIDER -->
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">atau</div>
    <div class="divider-line"></div>
  </div>

  <!-- BTN PUBLIK -->
  <button class="btn-publik" onclick="masukPublik()">
    <i class="fas fa-eye"></i>
    Lihat Sebagai Publik (Tanpa Login)
  </button>

</div>

<div class="version">© 2025 Kas Kelas X RPL · v2.0</div>

<script>
function togglePass(){
  const input = document.getElementById('loginPassword');
  const icon = document.getElementById('eyeIcon');
  const isPass = input.type === 'password';
  input.type = isPass ? 'text' : 'password';
  icon.className = isPass ? 'fas fa-eye-slash' : 'fas fa-eye';
}

function handleEnter(e){
  if(e.key === 'Enter') doLogin();
}

function showError(msg){
  const el = document.getElementById('errorMsg');
  document.getElementById('errorText').textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 4000);
}

function hideError(){
  document.getElementById('errorMsg').classList.remove('show');
}

function createRipple(btn){
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  const ripple = document.createElement('div');
  ripple.className = 'ripple';
  ripple.style.cssText = `width:${size}px;height:${size}px;left:${rect.width/2 - size/2}px;top:${rect.height/2 - size/2}px;`;
  btn.appendChild(ripple);
  setTimeout(()=>ripple.remove(), 600);
}

async function doLogin(){
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const btn = document.getElementById('btnLogin');

  hideError();

  if(!username){
    showError('Username tidak boleh kosong');
    document.getElementById('loginUsername').focus();
    return;
  }
  if(!password){
    showError('Password tidak boleh kosong');
    document.getElementById('loginPassword').focus();
    return;
  }

  // Loading state
  btn.disabled = true;
  btn.innerHTML = `<div class="spinner"></div> Memeriksa akun...`;
  createRipple(btn);

  try{
    const res = await fetch('/api/auth/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await res.json();

    if(data.success){
      // Simpan session
      localStorage.setItem('kas_user', JSON.stringify(data.data));
      // Animasi sukses
      btn.innerHTML = `<i class="fas fa-check-circle"></i> Berhasil! Mengalihkan...`;
      btn.style.background = 'linear-gradient(135deg,#26A69A,#00897B)';
      // Redirect ke index
      setTimeout(()=>{ window.location.href = '/'; }, 800);
    } else {
      btn.disabled = false;
      btn.innerHTML = `<i class="fas fa-sign-in-alt"></i> Masuk Sebagai Bendahara / Admin`;
      btn.style.background = '';
      showError(data.message || 'Username atau password salah');
      // Shake input
      document.getElementById('loginPassword').style.animation = 'none';
      document.getElementById('loginPassword').value = '';
      document.getElementById('loginPassword').focus();
    }
  }catch(e){
    btn.disabled = false;
    btn.innerHTML = `<i class="fas fa-sign-in-alt"></i> Masuk Sebagai Bendahara / Admin`;
    showError('Koneksi gagal, coba lagi');
  }
}

function masukPublik(){
  localStorage.removeItem('kas_user');
  localStorage.setItem('kas_mode','publik');
  window.location.href = '/';
}

// Cek jika sudah login
const savedUser = localStorage.getItem('kas_user');
if(savedUser){
  try{
    const u = JSON.parse(savedUser);
    if(u && u.username) window.location.href = '/';
  }catch(e){ localStorage.removeItem('kas_user'); }
}
</script>
</body>
</html>
